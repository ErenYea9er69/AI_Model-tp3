<div class="container">
  <form class="form-inline">
    <div class="form-group mx-sm-3 mb-2 mt-2">
      <label>Nom Modèle IA</label>
      <input #nom (keyup)="onKeyUp(nom.value)" type="text" class="form-control" />
    </div>
  </form>

  <div class="card shadow mb-4">
    <div class="card-body">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Id</th>
            <th>Nom</th>
            <th>Prix</th>
            <th>Date Création</th>
            <th>Catégorie</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (model of aiModels; track model.idAI) {
          <tr>
            <td>{{ model.idAI }}</td>
            <td>{{ model.nomAI }}</td>
            <td>{{ model.prixAI }}</td>
            <td>{{ model.dateCreation | date:'dd/MM/yyyy' }}</td>
            <td>{{ model.aiCategory?.nomCat }}</td>
            <td>
              <a class="btn btn-danger" (click)="supprimerAIModel(model)">Supprimer</a>
              <a class="btn btn-success" [routerLink]="['/updateAIModel', model.idAI]">Modifier</a>
            </td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>

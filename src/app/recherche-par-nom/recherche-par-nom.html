<div class="container">
  <!-- Search by Name (API) -->
  <form class="form-inline mt-2">
    <div class="form-group mx-sm-3 mb-2">
      <label>Nom Produit</label>
      <input type="text" class="form-control" [(ngModel)]="nomAI" name="nomAI" />
      <button type="submit" (click)="rechercherProds()" class="btn btn-primary mb-2 ml-2">Rechercher</button>
    </div>
  </form>

  <hr />

  <!-- Search by Typing (KeyUp) -->
  <form class="form-inline mt-2">
    <div class="form-group mx-sm-3 mb-2">
      <label>Nom Produit en tapant (KeyUp)</label>
      <input #searchInput (keyup)="onKeyUp(searchInput.value)" type="text" class="form-control" />
    </div>
  </form>

  <hr />

  <!-- Search by Pipe -->
  <form class="form-inline mt-2">
    <div class="form-group mx-sm-3 mb-2">
      <label>Nom Produit en tapant (Pipe)</label>
      <input [(ngModel)]="searchTerm" name="searchTerm" class="form-control" />
    </div>
  </form>

  <div class="card shadow mb-4 mt-3">
    <div class="card-body">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Id</th>
            <th>Nom</th>
            <th>Prix</th>
            <th>Date Création</th>
            <th>Catégorie</th>
          </tr>
        </thead>
        <tbody>
          @for (model of aiModels | searchFilter: searchTerm; track model.idAI) {
          <tr>
            <td>{{ model.idAI }}</td>
            <td>{{ model.nomAI }}</td>
            <td>{{ model.prixAI }}</td>
            <td>{{ model.dateCreation | date:'dd/MM/yyyy' }}</td>
            <td>{{ model.aiCategory?.nomCat }}</td>
            <!--
            <td><a class="btn btn-danger" (click)="supprimerAIModel(model)">Supprimer</a></td>
            <td><a class="btn btn-success" [routerLink]="['/updateAIModel', model.idAI]">Modifier</a></td>
            -->
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>

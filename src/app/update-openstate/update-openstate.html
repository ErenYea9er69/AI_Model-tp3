<form>
  <div class="form-group">
    <label>Id Catégorie</label>
    <input type="number" [(ngModel)]="category.idCat" name="idCat" class="form-control" readonly />
  </div>
  <div class="form-group">
    <label>Nom Catégorie</label>
    <input type="text" [(ngModel)]="category.nomCat" name="nomCat" class="form-control" />
  </div>
  <div class="mt-2 text-center">
    <button type="submit" (click)="saveCategory()" class="btn btn-success">
      {{ ajout ? 'Ajouter' : 'Modifier' }}
    </button>
  </div>
</form>

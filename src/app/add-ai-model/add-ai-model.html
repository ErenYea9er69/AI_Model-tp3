<div class="container">
  <div>
    <h2>Ajouter un Modèle IA :</h2>
  </div>
  <form>
    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>Id Modèle</label>
      <input type="number" [(ngModel)]="newAIModel.idAI" name="idAI" class="form-control" />
    </div>
    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Nom Modèle</label>
      <input type="text" [(ngModel)]="newAIModel.nomAI" name="nomAI" class="form-control" />
    </div>
    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>Prix (Accuracy %)</label>
      <input type="number" [(ngModel)]="newAIModel.prixAI" name="prixAI" class="form-control" />
    </div>
    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Date Création</label>
      <input type="date" [(ngModel)]="newAIModel.dateCreation" name="dateCreation" class="form-control" />
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Catégorie</label>
      <select class="form-control form-control-lg" id="idCat" name="idCat" [(ngModel)]="newIdCat">
        @for(cat of categories; track cat.idCat){
        <option [value]="cat.idCat">{{ cat.nomCat }}</option>
        }
      </select>
    </div>

    <div class="mt-2">
      <button type="submit" (click)="addAIModel()" class="btn btn-success">Ajouter</button>
    </div>
  </form>
</div>

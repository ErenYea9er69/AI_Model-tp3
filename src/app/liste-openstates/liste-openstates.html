<div class="container">
  <div class="col-sm-4 col-md-4 col-lg-4 mb-4">
    <app-update-openstate 
      [theme]="updatedCat" 
      (themeUpdated)="catUpdated($event)" 
      [ajout]="ajout">
    </app-update-openstate>
  </div>

  <div class="card shadow mb-4">
    <div class="card-body">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Id</th>
            <th>Nom Catégorie</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          @for(cat of themes; track cat.idTheme) {
          <tr>
            <td>{{cat.idTheme}}</td>
            <td>{{cat.nomTheme}}</td>
            <td><a class="btn btn-success" (click)="updateCat(cat)">Editer</a></td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>

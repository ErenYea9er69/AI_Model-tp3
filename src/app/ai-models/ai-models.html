<div class="container">
  <div class="card shadow mb-4">
    <div class="card-body">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>N°</th>
            <th>Id</th>
            <th>Nom</th>
            <th>Prix</th>
            <th>Date Création</th>
            <th>Catégorie</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (model of aiModels; track model.idAI; let index =$index) {
          <tr>
            <td>{{ index + 1 }}</td>
            <td>{{ model.idAI }}</td>
            <td>{{ model.nomAI }}</td>
            <td>{{ model.prixAI }}</td>
            <td>{{ model.dateCreation | date:'dd/MM/yyyy' }}</td>
            <td>{{ model.aiCategory?.nomCat }}</td>
            <td>
              <a *ngIf="authService.isAdmin()" class="btn btn-danger" (click)="supprimerAIModel(model)">Supprimer</a>
              <a *ngIf="authService.isAdmin()" class="btn btn-success" [routerLink]="['/updateAIModel', model.idAI]">Modifier</a>
            </td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>

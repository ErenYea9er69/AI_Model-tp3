<div class="container mt-5">
    <div class="row justify-content-md-center">
        <div class="col-md-4">
            @if(err==1) {
                <div class="alert alert-danger">
                    <strong>{{message}}</strong>
                </div>
            }
            <form>
                <div class="form-group mb-3">
                    <label class="form-label">Nom Utilisateur :</label>
                    <input type="text" name="username" class="form-control" [(ngModel)]="user.username">
                </div>
                <div class="form-group mb-3">
                    <label class="form-label">Mot de passe :</label>
                    <input type="password" name="password" [(ngModel)]="user.password" class="form-control">
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="button" (click)="onLoggedin()" class="btn btn-primary">Connexion</button>
                    <p class="text-center mt-3">Vous n'avez pas un compte ? <a routerLink="/register">S'inscrire</a></p>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="container">
    <div>
        <h2>Modifier un Modèle IA :</h2>
    </div>
    <form>
        <div class="col-sm-2 col-md-2 col-lg-2">
            <label>Id Modèle</label>
            <input readonly type="number" [(ngModel)]="currentAIModel.idAI" name="idAI" class="form-control" />
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Nom Modèle</label>
            <input type="text" [(ngModel)]="currentAIModel.nomAI" name="nomAI" class="form-control" />
        </div>
        <div class="col-sm-2 col-md-2 col-lg-2">
            <label>Prix (Accuracy %)</label>
            <input type="number" [(ngModel)]="currentAIModel.prixAI" name="prixAI" class="form-control" />
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Date Création</label>
            <input type="date" [ngModel]="currentAIModel.dateCreation | date: 'yyyy-MM-dd'"
                (ngModelChange)="currentAIModel.dateCreation = $event" name="dateCreation" class="form-control" />
        </div>

        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Catégorie</label>
            <select class="form-control form-control-lg" id="idCat" name="idCat" [(ngModel)]="updatedCatId">
                @for(cat of categories; track cat.idCat){
                <option [value]="cat.idCat">{{ cat.nomCat }}</option>
                }
            </select>
        </div>

        <div class="col-sm-12 col-md-12 col-lg-12 mt-2">
            <label class="mb-2">Image :</label>
            <input type="file" (change)="onImageUpload($event)" class="form-control">
        </div>

        <div class="mt-2">
            <button type="submit" (click)="onAddImageAIModel()" class="btn btn-success">Ajouter Image</button>
        </div>

        <div class="card shadow mb-4 mt-3">
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Images</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        @for(img of currentAIModel.images; track img.idImage) {
                        <tr>
                            <td>
                                <img class="card-img-top img-responsive"
                                    src="{{'data:' + img.type + ';base64,' + img.image}}"
                                    style="height :50px;width:100px">
                            </td>
                            <td style="width:20%">
                                <a class="btn btn-danger" (click)="supprimerImage(img)">Supprimer</a>
                            </td>
                        </tr>
                        }
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-2">
            <button type="submit" (click)="updateAIModel()" class="btn btn-primary">Modifier le Modèle</button>
        </div>
    </form>
</div>

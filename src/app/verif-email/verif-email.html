<div class="container mt-5">
    <div class="row justify-content-md-center">
        <div class="col-md-4">
            <h2 class="text-center mb-4">Vérification de l'email</h2>
            
            @if(err) {
                <div class="alert alert-danger">
                    <strong>{{err}}</strong>
                </div>
            }

            <div class="card shadow-sm">
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Code de confirmation</label>
                            <input type="text" name="code" [(ngModel)]="code" class="form-control form-control-lg text-center" 
                                placeholder="Entrez le code à 6 chiffres" maxlength="6">
                            <div class="form-text text-center mt-2">
                                Veuillez entrer le code envoyé par mail à <strong>{{user.email}}</strong>
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-success" (click)="onValidateEmail()" [disabled]="!code">
                                Valider mon compte
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <p class="text-center mt-3">
                Vous n'avez pas reçu le code ? <a href="javascript:void(0)" class="text-decoration-none">Renvoyer</a>
            </p>
        </div>
    </div>
</div>
